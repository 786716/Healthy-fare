<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Fare</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #037C36; --gold: #C99100; --bg: #F8F7F4; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); text-align: center; }
        
        /* Шапка */
        header { display: flex; justify-content: space-between; padding: 15px; background: white; align-items: center; }
        .nav-btn { background: none; border: 1px solid #ddd; padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        /* Контент по ТЗ */
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .logo-main { width: 120px; margin: 20px 0; }
        
        .media-box { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .media-item { width: 45%; aspect-ratio: 1; background: #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Сеты */
        .sets-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px; }
        .set-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; }
        .set-card:active { border-color: var(--green); }
    </style>
</head>
<body>

<header>
    <button class="nav-btn" onclick="openAdmin()">⚙️</button>
    <div id="lang-toggle">
        <button class="nav-btn" onclick="setLang('ru')">RU</button>
        <button class="nav-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="nav-btn">🛒 <span id="cart-count">0</span></button>
</header>

<div class="container">
    <img src="https://healthy-fare.vercel.app/logo.png" class="logo-main" alt="Logo">

    <p id="desc1" style="font-size: 1.1rem; color: #444;"></p>

    <div class="media-box">
        <div class="media-item" id="video-slot">ВИДЕО</div>
        <div class="media-item" id="photo-slot">ФОТО</div>
    </div>

    <p id="desc2" style="font-style: italic; color: #666;"></p>

    <hr style="border: 0; border-top: 1px solid #ddd; margin: 40px 0;">

    <div class="sets-grid">
        <div class="set-card" onclick="loadSet('weight-loss')">
            <h3 id="set1-title"></h3>
            <span style="color:var(--gold)">1200 kcal</span>
        </div>
        <div class="set-card" onclick="loadSet('balance')">
            <h3 id="set2-title"></h3>
            <span style="color:var(--gold)">1800 kcal</span>
        </div>
        <div class="set-card" onclick="loadSet('muscle')">
            <h3 id="set3-title"></h3>
            <span style="color:var(--gold)">2500 kcal</span>
        </div>
    </div>
</div>

<script>
    const translations = {
        ru: {
            desc1: "Добро пожаловать в Healthy Fare. Мы готовим здоровую еду с доставкой.",
            desc2: "Наши рационы разработаны лучшими диетологами региона.",
            set1: "Снижение",
            set2: "Баланс",
            set3: "Набор"
        },
        en: {
            desc1: "Welcome to Healthy Fare. We provide healthy food delivery services.",
            desc2: "Our rations are developed by the region's top nutritionists.",
            set1: "Loss",
            set2: "Balance",
            set3: "Gain"
        }
    };

    function setLang(lang) {
        document.getElementById('desc1').innerText = translations[lang].desc1;
        document.getElementById('desc2').innerText = translations[lang].desc2;
        document.getElementById('set1-title').innerText = translations[lang].set1;
        document.getElementById('set2-title').innerText = translations[lang].set2;
        document.getElementById('set3-title').innerText = translations[lang].set3;
        localStorage.setItem('preferredLang', lang);
    }

    // Инициализация при загрузке
    setLang(localStorage.getItem('preferredLang') || 'ru');

    function openAdmin() {
        const pass = prompt("Введите пароль админа:");
        if(pass === "123") alert("Доступ разрешен");
    }

    function loadSet(type) {
        alert("Загружаем сет: " + type + ". Тут мы подключим Supabase.");
    }
</script>

</body>
</html>
