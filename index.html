<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Fare | Питание для профи</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #037C36; --bg: #F8F7F4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #333; }
        
        /* Шапка по ТЗ */
        header { 
            display: flex; justify-content: space-between; padding: 10px 15px; 
            background: white; align-items: center; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-btn { background: #eee; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Контентная часть */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        .main-logo { width: 150px; margin-bottom: 20px; }
        
        /* Медиа-блок (Маленькие видео и фото по ТЗ) */
        .media-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .media-item { 
            width: 140px; height: 140px; background: #000; border-radius: 12px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* Описания */
        .desc-text { line-height: 1.5; font-size: 1.1rem; margin: 20px 0; }

        /* Сеты - кнопки входа в меню */
        .set-selector { 
            background: white; border: 2px solid #ddd; border-radius: 15px; 
            padding: 25px; margin: 15px 0; width: 100%; cursor: pointer;
            font-size: 1.5rem; font-weight: bold; color: var(--green); transition: 0.2s;
        }
        .set-selector:active { border-color: var(--green); background: #f0fff0; }

        /* Сетка блюд (скрыта до выбора сета) */
        #menu-view { display: none; padding: 20px; }
        .dish-card { background: white; border-radius: 15px; margin-bottom: 20px; padding: 15px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <button class="nav-btn" onclick="openAdmin()">⚙️ Admin</button>
    <div class="lang-group">
        <button class="nav-btn" onclick="setLanguage('ru')">RU</button>
        <button class="nav-btn" onclick="setLanguage('en')">EN</button>
    </div>
    <button class="nav-btn">🛒 <span id="cart-count">0</span></button>
</header>

<div id="main-view" class="container">
    <img src="https://healthy-fare.vercel.app/logo.png" class="main-logo" alt="Logo">

    <div id="desc-1" class="desc-text"></div>

    <div class="media-group">
        <div class="media-item">
            <video width="100%" height="100%" controls><source src="video.mp4" type="video/mp4"></video>
        </div>
        <div class="media-item">
            <img src="photo.jpg" style="width:100%; height:100%; object-fit: cover;">
        </div>
    </div>

    <div id="desc-2" class="desc-text" style="font-weight: bold;"></div>

    <div id="sets-list">
        <button class="set-selector" onclick="showMenu(1)">СЕТ 1</button>
        <button class="set-selector" onclick="showMenu(2)">СЕТ 2</button>
        <button class="set-selector" onclick="showMenu(3)">СЕТ 3</button>
    </div>
</div>

<div id="menu-view" class="container">
    <button onclick="backToMain()" style="margin-bottom:20px;">⬅ Назад</button>
    <h2 id="selected-set-title"></h2>
    <div id="dishes-container"></div>
</div>

<script>
    // ВСЕ ТЕКСТЫ ТУТ
    const content = {
        ru: {
            d1: "ТВОЙ ТЕКСТ ОПИСАНИЯ 1 ИЗ ТЗ (ПРО ДАЛЬНОБОЙЩИКОВ)",
            d2: "ТВОЙ ТЕКСТ ОПИСАНИЯ 2 ИЗ ТЗ (СУТЬ ПРОДАЖИ)",
            s1: "СЕТ №1", s2: "СЕТ №2", s3: "СЕТ №3"
        },
        en: {
            d1: "YOUR DESCRIPTION 1 IN ENGLISH",
            d2: "YOUR DESCRIPTION 2 IN ENGLISH",
            s1: "SET #1", s2: "SET #2", s3: "SET #3"
        }
    };

    let currentLang = 'ru';

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('desc-1').innerText = content[lang].d1;
        document.getElementById('desc-2').innerText = content[lang].d2;
        const buttons = document.querySelectorAll('.set-selector');
        buttons[0].innerText = content[lang].s1;
        buttons[1].innerText = content[lang].s2;
        buttons[2].innerText = content[lang].s3;
    }

    function showMenu(setNum) {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('selected-set-title').innerText = content[currentLang]['s' + setNum];
        // Тут будет fetch из Supabase с фильтром по номеру сета
    }

    function backToMain() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('menu-view').style.display = 'none';
    }

    function openAdmin() {
        if(prompt("Пароль:") === "123") { window.location.href = "/admin"; }
    }

    // Старт
    setLanguage('ru');
</script>

</body>
</html>
