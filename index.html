<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Healthy Fare</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #F8F7F4; color: #037C36; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 10px; display: inline-block; width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>HEALTHY FARE</h1>
    <div id="menu">Загрузка...</div>

        <script>
        const _supabase = supabase.createClient(
            'https://xjhrlwmwbjkrkengmlbn.supabase.co', 
            'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqaHJsd213YmprcmtlbmdtbGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODIxMDUsImV4cCI6MjA5MDc1ODEwNX0.Ciff-5g3VuASwa4fKdMIsccCvgFVYhxGRk9szwvMtyA'
        );

        async function loadMenu() {
            try {
                const { data, error } = await _supabase.from('dishes').select('*');
                if (error) throw error;
                
                const container = document.getElementById('menu');
                if (!data || data.length === 0) {
                    container.innerHTML = 'В таблице пока нет блюд';
                    return;
                }

                container.innerHTML = data.map(d => `
                    <div class="card">
                        <h3>${d.title_ru || 'Без названия'}</h3>
                        <p>${d.price ? d.price + ' AED' : 'Цена не указана'}</p>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('menu').innerHTML = 'Ошибка: ' + err.message;
            }
        }
        loadMenu();
    </script>
