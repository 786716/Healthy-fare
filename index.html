<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Fare | Меню</title>
    <style>
        :root { --green: #037C36; --light: #F8F7F4; }
        body { margin: 0; font-family: sans-serif; background-color: var(--light); color: #333; text-align: center; }
        
        /* Стили для маленьких компактных медиа-блоков */
        .compact-media { max-width: 400px; margin: 20px auto; border-radius: 10px; overflow: hidden; background: #eee; }
        .dish-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin: 10px; display: inline-block; width: 250px; text-align: left; background: white; }
    </style>
</head>
<body>

    <div style="padding: 40px 0;">
        <img src="https://healthy-fare.vercel.app/logo.png" alt="Healthy Fare" style="width: 100px;">
    </div>

    <p style="padding: 0 10%; line-height: 1.6;">
        [ СЮДА ВСТАВЬ ТЕКСТ ОПИСАНИЯ 1 ИЗ ТЗ ]
    </p>

    <div class="compact-media" style="aspect-ratio: 16/9;">
        <div style="padding-top: 20%; color: #888;">видео</div>
    </div>

    <div class="compact-media" style="aspect-ratio: 1/1;">
        <div style="padding-top: 20%; color: #888;">фото</div>
    </div>

    <p style="padding: 0 10%; line-height: 1.6; font-style: italic;">
        [ СЮДА ВСТАВЬ ТЕКСТ ОПИСАНИЯ 2 ИЗ ТЗ ]
    </p>

    <div style="background: white; padding: 10px; border-top: 1px solid #eee; margin-top: 40px;">
        <button style="border:none; background:none;">RU/EN</button>
        <div style="float:right;">🛒 0</div>
    </div>

    <section style="padding: 40px 0; background: #eee;">
        <h2>СЕТЫ</h2>
        <div class="dish-card">Сет 1</div>
        <div class="dish-card">Сет 2</div>
        <div class="dish-card">Сет 3</div>
    </section>

</body>
</html>
